name: ci/cd

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: [
          '8.2',
          '8.3',
          '8.4',
          '8.5'
        ]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: run
        run: docker compose run --rm app
        env:
          UID: 0
          PHP_VERSION: ${{ matrix.php }}
          INFECTION_BADGE_API_KEY: ${{secrets.INFECTION_BADGE_API_KEY}}
